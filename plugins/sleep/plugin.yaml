name: sleep
capability_label: "Sleep"   # ONE UI toggle for all verbs of this package
capability_description: "The character can go to sleep (leaves the visible map) and wake up again on their own."
version: "1.0.0"
description: Sleep/WakeUp verbs — set the is_sleeping flag and move the character off-map while asleep

skills:
  - skill_id: sleep
    class: SleepWakeSkill
    params: {asleep: true}
    always_load: true
  - skill_id: wakeup
    class: SleepWakeSkill
    params: {asleep: false}
    always_load: true

templates:
  llm: templates/llm
