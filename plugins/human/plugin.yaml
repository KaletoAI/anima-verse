name: human
being: person   # species prompt noun for scene composition
version: "1.0.0"
description: Human species — anatomy body slots, clothing-slot topology and the UI silhouette

# Species content applies to the human character templates (incl. the
# local-only NSFW marker so those worlds get the slots too).
apply_to: ["human-default", "human-roleplay", "human-roleplay-nsfw"]

silhouette:
  asset: assets/silhouette.svg
  # Slot marker positions (x%, y%) in the image coordinate system.
  anchors:
    head: [50, 6]
    neck: [50, 19]
    outer: [33, 40]
    top: [50, 33]
    underwear_top: [66, 33]
    bottom: [50, 55]
    underwear_bottom: [66, 55]
    legs: [50, 73]
    feet: [50, 92]

# Full human clothing topology (display order) — replaces the core default.
piece_slots:
  - {id: head, label: Head}
  - {id: neck, label: Neck}
  - {id: outer, label: "Coat & jacket"}
  - {id: top, label: Top}
  - {id: underwear_top, label: "Underwear top"}
  - {id: bottom, label: Bottom}
  - {id: underwear_bottom, label: "Underwear bottom"}
  - {id: legs, label: Legs}
  - {id: feet, label: Feet}

# SFW human anatomy. Attribute options mirror today's template selects
# (values migrate per world on demand — plan-body-slots.md). NSFW anatomy
# is a SEPARATE pack (anima-verse-packs, requires: [human]).
body_slots:
  - id: hair
    face: true   # belongs into portrait/expression prompts
    attributes:
      color:
        type: select
        allow_custom: true
        migrate_from: hair_color
        options: [blonde, brunette, black, red, auburn, gray, white, pink]
        # Attraction matching (relationship engine): phrases in the OTHER
        # side's romantic_interests text that mean this canonical value.
        interest_aliases:
          black: ["schwarze haare", "black hair", "dunkle haare", "dark hair"]
          brunette: ["schwarze haare", "black hair", "dunkle haare", "dark hair", "braune haare", "brown hair"]
          red: ["rote haare", "red hair"]
          blonde: ["blonde haare", "blond hair", "blonde hair"]
      length:
        type: select
        allow_custom: true
        migrate_from: hair_length
        options: [very short, short, medium, long, very long]
        interest_aliases:
          long: ["lange haare", "long hair"]
          very long: ["lange haare", "long hair"]
          short: ["kurze haare", "short hair"]
          very short: ["kurze haare", "short hair"]
    prompt:
      always: "{length} {color} hair"
  - id: eyes
    face: true   # belongs into portrait/expression prompts
    attributes:
      color:
        type: select
        allow_custom: true
        migrate_from: eye_color
        options: [blue, green, brown, hazel, gray, amber]
    prompt:
      always: "{color} eyes"
  - id: skin
    face: true   # belongs into portrait/expression prompts
    attributes:
      tone:
        type: select
        allow_custom: true
        migrate_from: skin_color
        options: [fair, light, medium, olive, tan, brown, dark brown, dark, pale]
    prompt:
      always: "{tone} skin"
  - id: build
    attributes:
      height:
        type: select
        allow_custom: true
        migrate_from: size
        options: [petite, short, average height, tall, giant]
        interest_aliases:
          tall: ["gross", "groß", "große", "grosse", "großer", "grosser", "tall"]
          giant: ["gross", "groß", "große", "grosse", "großer", "grosser", "tall"]
          short: ["klein", "kleine", "kleiner", "short", "petite", "zierlich", "zierliche"]
          petite: ["klein", "kleine", "kleiner", "short", "petite", "zierlich", "zierliche"]
      type:
        type: select
        allow_custom: true
        migrate_from: body_type
        options: [petite, slim, average, athletic, curvy, muscular, stocky, voluptuous]
        interest_aliases:
          slim: ["schlank", "schlanke", "slim"]
          petite: ["schlank", "schlanke", "slim", "zierlich", "zierliche", "petite"]
          athletic: ["athletisch", "athletic", "sportlich", "muskuloes", "muskulös", "muscular"]
          muscular: ["muskuloes", "muskulös", "muscular", "athletisch", "athletic"]
          curvy: ["kurvig", "kurvige", "curvy", "kurven"]
          voluptuous: ["kurvig", "kurvige", "curvy", "üppig", "ueppig", "voluptuous"]
    prompt:
      always: "{height}, {type} build"
  - id: facial_hair
    face: true   # belongs into portrait/expression prompts
    applies_to: {gender: [male]}
    attributes:
      style:
        type: select
        allow_custom: true
        migrate_from: facial_hair
        migrate_skip: [none]
        options: [clean-shaven, light stubble, short beard, full beard, mustache]
    prompt:
      always: "{style}"
