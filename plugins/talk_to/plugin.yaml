name: talk_to
version: "1.0.0"
description: Face-to-face dialogue verb — the character speaks to someone present in the room
enabled_default: true        # core verb: loads even without a config/env entry

skills:
  - skill_id: talk_to
    default_enabled: true    # replaces the entry in DEFAULT_NEW_CHARACTER_SKILLS
    cascade_brake: true      # replaces the class attribute (F7)

templates:
  llm: templates/llm

config_schema:
  talk_to:
    label: TalkTo (face-to-face)
    fields:
      enabled: {type: bool, label: Enabled, default: true}
